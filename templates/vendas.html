
{% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-between mb-3">
    <a href="/dashboard" class="btn btn-secondary">
        ← Voltar
    </a>

    <button onclick="location.reload()"
            class="btn btn-warning">
        Nova Venda
    </button>
</div>

<h3>Nova Venda</h3>

<div class="card p-3 shadow-sm">

    <div class="row">
        <div class="col-md-6">
            <select id="produto" class="form-select mb-2">
                {% for p in produtos %}
                <option value="{{p.id}}"
                        data-descricao="{{p.descricao}}"
                        data-valor="{{p.valor}}"
                        data-estoque="{{p.estoque_atual}}"
                        data-imprime="{{p.imprimir_cupom}}">
                    {{p.descricao}} - R$ {{p.valor}} (Estoque: {{p.estoque_atual}})
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="col-md-3">
            <input type="number" id="quantidade"
                   class="form-control mb-2"
                   placeholder="Quantidade" min="1">
        </div>

        <div class="col-md-3">
            <button type="button"
                    onclick="adicionarProduto()"
                    class="btn btn-primary w-100">
                Adicionar
            </button>
        </div>
    </div>

    <hr>

    <h5>Itens da Venda</h5>
    <ul id="listaProdutos" class="list-group mb-3"></ul>

    <h5>Total: R$ <span id="valorTotal">0.00</span></h5>

    <hr>
      
    <h5>Forma de Pagamento</h5>

    <div class="row mb-3">
        
            <!-- COLUNA ESQUERDA -->
            <div class="col-6">
        
                <div class="form-check mb-3">
                    <input class="form-check-input" type="radio" name="formaPagamento" value="Crédito">
                    <label class="form-check-label">Crédito</label>
                </div>
        
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="formaPagamento" value="Débito">
                    <label class="form-check-label">Débito</label>
                </div>
        
            </div>
        
            <!-- COLUNA DIREITA -->
            <div class="col-6">
        
                <div class="form-check mb-3">
                    <input class="form-check-input" type="radio" name="formaPagamento" value="Pix">
                    <label class="form-check-label">Pix</label>
                </div>
        
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="formaPagamento" value="Dinheiro">
                    <label class="form-check-label">Dinheiro</label>
                </div>
        
            </div>
        
        </div>
    
    </div>

    <div id="area_pix" style="display:none" class="mt-3">

    <h5>Pagamento via PIX</h5>
    
    <img id="qrcode_pix" style="max-width:250px">
    
    <div class="mt-3">
    
    <label>PIX Copia e Cola</label>
    
    <textarea id="pix_copia_cola"
    class="form-control"
    rows="3"
    readonly></textarea>
    
    <button class="btn btn-dark mt-2"
    onclick="copiarPix()">
    Copiar PIX
    </button>
    
    </div>
    
    </div>

    <div id="areaDinheiro" style="display:none;" class="mt-3">
    
        <label class="form-label fw-bold">Valor Recebido</label>
    
        <input type="number"
               step="0.01"
               min="0"
               id="valorRecebido"
               class="form-control"
               placeholder="0.00"
               oninput="calcularTroco()">
    
        <div class="mt-2">
            <strong>Troco: R$ <span id="trocoCalculado">0.00</span></strong>
        </div>
    
    </div>
    
    <hr>

    <div class="d-flex gap-2">
        <button onclick="salvarVenda()"
                class="btn btn-success">
            Salvar Venda
        </button>      
    </div>

    <hr>
    
    <div id="registroVenda" style="display:none;" class="card p-3 shadow-sm mt-4">
    
        <h5 class="mb-3">Venda Atual</h5>
    
        <ul id="resumoVenda" class="list-group mb-3"></ul>
    
        <div class="fw-bold mb-3">
            Total da Venda:
            <span id="totalResumo" class="text-success fs-5">
                R$ 0.00
            </span>
        </div>
    
        <div class="d-flex gap-2 flex-wrap">
    
            <button onclick="imprimirCupom(window.itensUltimaVenda)"
                    class="btn btn-dark">
                Imprimir
            </button>
    
            <button onclick="cancelarVenda()"
                    class="btn btn-danger">
                Cancelar Venda
            </button>
    
        </div>
    
    </div>

</div>

<script>

let itensVenda = [];
let totalVenda = 0;
let estoqueControle = {};
window.itensUltimaVenda = [];
window.numeroVendaAtual = null;
window.dataVendaAtual = null;

function copiarPix(){

const texto=document.getElementById("pix_copia_cola").value

navigator.clipboard.writeText(texto)

alert("PIX copiado!")

}


function gerarPix(){

if(totalVenda <= 0){

document.getElementById("area_pix").style.display = "none"

return

}

fetch("/gerar_pix",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
valor:totalVenda
})

})
.then(r=>r.json())
.then(data=>{

document.getElementById("area_pix").style.display="block"

document.getElementById("qrcode_pix").src = data.qrcode

document.getElementById("pix_copia_cola").value=
data.copia_cola

})
.catch(erro => {

console.error("Erro ao gerar PIX:", erro)

alert("Erro ao gerar PIX. Verifique a conexão.")

})
    
}


document.querySelectorAll('input[name="formaPagamento"]').forEach(radio=>{

radio.addEventListener("change",function(){

const areaPix=document.getElementById("area_pix")
const areaDinheiro=document.getElementById("areaDinheiro")

areaPix.style.display="none"
areaDinheiro.style.display="none"

if(this.value==="Dinheiro"){

areaDinheiro.style.display="block"

}

if(this.value==="Pix"){

gerarPix()

}

})

})
    
function atualizarListaVisual(){

    const lista = document.getElementById("listaProdutos");
    lista.innerHTML = "";

    let agrupado = {};

    itensVenda.forEach(item => {

        if(!agrupado[item.id]){
            agrupado[item.id] = {
                descricao: item.descricao,
                valor: item.valor,
                quantidade: 0
            };
        }

        agrupado[item.id].quantidade += 1;
    });

    Object.keys(agrupado).forEach(id => {

        const produto = agrupado[id];
        const totalItem = produto.quantidade * produto.valor;

        const li = document.createElement("li");
        li.className = "list-group-item d-flex justify-content-between align-items-center";

        li.innerHTML = `
            <span>
                ${produto.quantidade}x ${produto.descricao}
                <br>
                <small>Total: R$ ${totalItem.toFixed(2)}</small>
            </span>
            <button class="btn btn-sm btn-danger">X</button>
        `;

        li.querySelector("button").addEventListener("click", function(){

            const index = itensVenda.findIndex(i => i.id == id);

            if(index > -1){
                totalVenda -= produto.valor;
                estoqueControle[id] -= 1;
                atualizarEstoqueSelect(id, -1);
                itensVenda.splice(index,1);
            }

            atualizarListaVisual();
        });

        lista.appendChild(li);
    });

    document.getElementById("valorTotal").innerText =
        totalVenda.toFixed(2);

    const pixSelecionado =
        document.querySelector('input[name="formaPagamento"]:checked');

    if(pixSelecionado && pixSelecionado.value === "Pix"){
        gerarPix();
    }
    
}

function atualizarEstoqueSelect(id, quantidadeAlterada){

    const select = document.getElementById("produto");

    for(let i = 0; i < select.options.length; i++){

        if(select.options[i].value == id){

            let estoqueAtual = parseInt(select.options[i].getAttribute("data-estoque"));

            estoqueAtual -= quantidadeAlterada;

            select.options[i].setAttribute("data-estoque", estoqueAtual);

            const descricao = select.options[i].getAttribute("data-descricao");
            const valor = parseFloat(select.options[i].getAttribute("data-valor"));

            select.options[i].innerHTML =
                `${descricao} - R$ ${valor.toFixed(2)} (Estoque: ${estoqueAtual})`;

            break;
        }
    }
}
    
function adicionarProduto(){

    const select = document.getElementById("produto");
    const quantidadeInput = document.getElementById("quantidade").value;

    const quantidade = parseInt(quantidadeInput);

    if(isNaN(quantidade) || quantidade < 1){
        alert("Informe quantidade válida");
        return;
    }

    const option = select.options[select.selectedIndex];

    const id = option.value;

    const descricao = option.getAttribute("data-descricao");
    const valor = parseFloat(option.getAttribute("data-valor"));
    const estoqueDisponivel = parseInt(option.getAttribute("data-estoque"));

    if(!descricao || isNaN(valor) || isNaN(estoqueDisponivel)){
        alert("Erro ao ler dados do produto.");
        return;
    }

    if(!estoqueControle[id]){
        estoqueControle[id] = 0;
    }

    if((estoqueControle[id] + quantidade) > estoqueDisponivel){
        alert("Estoque insuficiente!");
        return;
    }

    for(let i = 0; i < quantidade; i++){
        const imprimeAttr = option.getAttribute("data-imprime");

        const item = {
        id,
        descricao,
        valor,
        imprime: !(imprimeAttr === "false" || imprimeAttr === "0" || imprimeAttr === "f")
        };
        itensVenda.push(item);
        totalVenda += valor;
        estoqueControle[id] += 1;
    }

    atualizarEstoqueSelect(id, quantidade);
    
    atualizarListaVisual();
    document.getElementById("quantidade").value = "";
}

function salvarVenda(){

    if(itensVenda.length === 0){
        alert("Adicione pelo menos um item");
        return;
    }

    const formaSelecionada = document.querySelector('input[name="formaPagamento"]:checked');

    if(!formaSelecionada){
        alert("Selecione a forma de pagamento!");
        return;
    }
    
    let valorRecebido = null;
    let troco = null;
    
    if(formaSelecionada.value === "Dinheiro"){
    
        valorRecebido = parseFloat(document.getElementById("valorRecebido").value);
    
        if(isNaN(valorRecebido)){
            alert("Informe o valor recebido.");
            return;
        }
    
        if(valorRecebido < totalVenda){
            alert("Valor recebido menor que o total da venda.");
            return;
        }
    
        troco = valorRecebido - totalVenda;
    }
    
    // 🔥 ABRE JANELA IMEDIATAMENTE (evita bloqueio)
    let janelaImpressao = window.open('', '', 'width=300,height=800');

    fetch("/salvar_venda", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            itens: itensVenda,
            forma_pagamento: formaSelecionada.value,
            valor_recebido: valorRecebido,
            troco: troco
        })
    })
    .then(res => res.json())
    .then(data => {

        if(data.erro){
            alert(data.erro);
            janelaImpressao.close();
            return;
        }

        if(data.alertas && data.alertas.length > 0){
            alert("⚠ Estoque baixo:\n\n" + data.alertas.join("\n"));
        }

        const resumo = document.getElementById("resumoVenda");
        resumo.innerHTML = "";

        window.itensUltimaVenda = [...itensVenda];

        let totalResumo = 0;
        let agrupado = {};

        itensVenda.forEach(item => {

            if(!agrupado[item.id]){
                agrupado[item.id] = {
                    descricao: item.descricao,
                    valor: item.valor,
                    quantidade: 0
                };
            }

            agrupado[item.id].quantidade += 1;
        });

        Object.keys(agrupado).forEach(id => {

            const produto = agrupado[id];
            const totalItem = produto.quantidade * produto.valor;

            const li = document.createElement("li");
            li.className = "list-group-item d-flex justify-content-between align-items-center";

            li.innerHTML = `
                <span>${produto.quantidade}x ${produto.descricao}</span>
                <strong>R$ ${totalItem.toFixed(2)}</strong>
            `;

            resumo.appendChild(li);
            totalResumo += totalItem;
        });

        document.getElementById("totalResumo").innerText =
            "R$ " + totalResumo.toFixed(2);

        document.getElementById("registroVenda").style.display = "block";

        const liPagamento = document.createElement("li");
        liPagamento.className = "list-group-item text-primary fw-bold";
        liPagamento.innerHTML =
            `Forma de Pagamento: ${data.forma_pagamento}`;
        resumo.appendChild(liPagamento);
        
        if(data.forma_pagamento === "Dinheiro"){
        
            const liTroco = document.createElement("li");
            liTroco.className = "list-group-item text-success fw-bold";
            liTroco.innerHTML =
                `Recebido: R$ ${parseFloat(data.valor_recebido).toFixed(2)}<br>
                 Troco: R$ ${parseFloat(data.troco).toFixed(2)}`;
            resumo.appendChild(liTroco);
        }

    
        window.numeroVendaAtual = data.numero_venda;
        window.dataVendaAtual = data.data_venda;

        imprimirCupom(window.itensUltimaVenda, janelaImpressao);

        atualizarEstoqueVisual();
        
        // Reset
        document.getElementById("listaProdutos").innerHTML = "";
        document.getElementById("valorTotal").innerText = "0.00";
        itensVenda = [];
        estoqueControle = {};
        totalVenda = 0;
    });
}

function atualizarEstoqueVisual() {

    fetch("/estoque_atual")
        .then(response => response.json())
        .then(data => {

            const select = document.getElementById("produto");

            data.forEach(produto => {

                const id = produto[0];
                const novoEstoque = produto[1];

                for(let i = 0; i < select.options.length; i++){

                    if(select.options[i].value == id){

                        // Atualiza apenas o estoque no dataset
                        select.options[i].dataset.estoque = novoEstoque;

                        // Pega valores já existentes
                        const descricao = select.options[i].getAttribute("data-descricao");
                        const valor = select.options[i].getAttribute("data-valor");

                        // Atualiza apenas o texto visível
                        select.options[i].innerHTML =
                            `${descricao} - R$ ${parseFloat(valor).toFixed(2)} (Estoque: ${novoEstoque})`;

                        break;
                    }
                }

            });

        });
}
    
function imprimirCupom(listaItens = window.itensUltimaVenda, janela = null){

    if(!listaItens || listaItens.length === 0){
        alert("Nenhum item para imprimir");
        return;
    }

    let total = 0;
    listaItens.forEach(i => {
    if(i.imprime){
    total += i.valor;
    }
    });

    if(!janela){
        janela = window.open('', '', 'width=300,height=800');
    }

    let conteudo = `
    <html>
    <head>
        <style>
            body{
                font-family: monospace;
                width:58mm;
                margin:0;
                padding:5px;
                text-align:center;
            }
        
            .item{
                margin:12px 0;   /* 🔥 AUMENTA ESPAÇAMENTO */
            }
        
            hr{
                border-top:1px dashed black;
                margin:8px 0;
            }
        
            .total{
                font-weight:bold;
                margin-top:15px;
            }
        </style>
    </head>
    <body>

        <h3>COMUNIDADE SÃO FRANCISCO DE ASSIS</h3>
        <div>Quermesse</div>
        <hr>

        <div><strong>Venda Nº:</strong> ${window.numeroVendaAtual}</div>
        <div><strong>Data:</strong> ${window.dataVendaAtual}</div>

        <hr>
    `;

    listaItens.forEach(item => {

    if(!item.imprime){
    return;
    }
    conteudo += `
        <div class="item">
            <div>${item.descricao}</div>
            <div>R$ ${item.valor.toFixed(2)}</div>
        </div>
        <hr>
    `;
    });

    conteudo += `
        <div class="total">
            TOTAL: R$ ${total.toFixed(2)}
        </div>
        <hr>
        <div class="text-center text-muted mt-4">
            <i class="bi bi-c-circle"></i> 2026 - Quermesse Online
        </div>
    </body>
    </html>
    `;

    janela.document.write(conteudo);
    janela.document.close();
    janela.focus();
    janela.print();
}


function cancelarVenda(){

    if(!window.numeroVendaAtual){
        alert("Nenhuma venda para cancelar");
        return;
    }

    const confirmar = confirm("⚠ Tem certeza que deseja CANCELAR esta venda?\n\nO estoque será restaurado.");

    if(!confirmar){
        return;
    }

    fetch("/cancelar_venda", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            numero_venda: window.numeroVendaAtual
        })
    })
    .then(res => res.json())
    .then(data => {

        if(data.erro){
            alert(data.erro);
            return;
        }

        alert("Venda cancelada com sucesso!");

        document.getElementById("registroVenda").style.display = "none";

        window.numeroVendaAtual = null;
        window.itensUltimaVenda = [];
    });
}


document.querySelectorAll('input[name="formaPagamento"]').forEach(radio => {

    radio.addEventListener("change", function(){

        const areaDinheiro = document.getElementById("areaDinheiro");

        if(this.value === "Dinheiro"){
            areaDinheiro.style.display = "block";
        } else {
            areaDinheiro.style.display = "none";
            document.getElementById("valorRecebido").value = "";
            document.getElementById("trocoCalculado").innerText = "0.00";
        }

    });

});

function calcularTroco(){

    const valorRecebido = parseFloat(document.getElementById("valorRecebido").value);
    const trocoSpan = document.getElementById("trocoCalculado");

    if(isNaN(valorRecebido)){
        trocoSpan.innerText = "0.00";
        return;
    }

    const troco = valorRecebido - totalVenda;

    trocoSpan.innerText = troco.toFixed(2);
}
    
</script>

{% endblock %}
